<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Go-men サポート</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
      color: #222;
      background: #fffdf8;
    }
    h1 { font-size: 32px; margin-bottom: 8px; }
    h2 { font-size: 20px; margin-top: 28px; }
    .card {
      background: #ffffff;
      border: 1px solid #e8e2d8;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }
    a { color: #8a6b2f; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>Go-men サポート</h1>
  <p class="muted">Go-men に関するお問い合わせ窓口です。</p>

  <div class="card">
    <h2>お問い合わせ</h2>
    <p>
      不具合報告、ご意見、ご要望は、以下のメールアドレスまでご連絡ください。
    </p>
    <p>
      Email:
      <a href="mailto:gomen.mendly@gmail.com">gomen.mendly@gmail.com</a>
    </p>
    <p class="muted">
      ※ このメールアドレスはあとで必ず自分の受け取れるものに変更してください。
    </p>
  </div>

  <div class="card">
    <h2>対応内容</h2>
    <ul>
      <li>不具合報告</li>
      <li>ご意見・ご要望</li>
      <li>利用に関するお問い合わせ</li>
    </ul>
  </div>

  <div class="card">
    <h2>運営者</h2>
    <p>Yoichi Okina</p>
  </div>
</body>
</html>
